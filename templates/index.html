<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCB Defect Detective // Neural Core</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <span>&#10148;</span>
    </div>

    <header>
        <div class="brand">PCB<span>_DEFENDER</span> // v1.0</div>
        <div class="header-controls">
            <input type="file" id="pcbInput" accept="image/*">
            <button class="btn" onclick="document.getElementById('pcbInput').click()">
                [+] Choose board
            </button>
        </div>
    </header>

    <main>

        <section id="examplesArea">
            <h2>> EXAMPLES</h2>
            <div class="examples-grid" id="examplesGrid">
            </div>

            <div
                style="margin-bottom: 30px; text-align: center; color: var(--text-dim); border-bottom: 1px solid #333; padding-bottom: 20px;">
                <p>Select an example above or upload your own image via the top menu.</p>
            </div>
        </section>

        <section id="templateArea" class="hidden fade-in">
            <h2>> TEMPLATE SELECTION</h2>

            <div class="template-selection">
                <p style="color: var(--accent-color)">Test board: <span id="selectedFileName"
                        style="color: white">file.jpg</span></p>
                <p style="margin-top: 10px; font-size: 0.9rem;">Select a golden template from the database or upload your own:</p>

                <div class="template-grid" id="templateGrid">
                </div>

                <div class="action-bar">
                    <button class="btn btn-secondary" onclick="resetUI()">
                        < CANCEL </button>

                            <div style="display: flex; gap: 10px;">
                                <input type="file" id="customTemplateInput" accept="image/*">
                                <button class="btn btn-secondary"
                                    onclick="document.getElementById('customTemplateInput').click()">
                                    Upload Custom Template
                                </button>
                                <button class="btn" id="startAnalysisBtn" onclick="startAnalysis()" disabled>
                                    START ANALYSIS >
                                </button>
                            </div>
                </div>
            </div>
        </section>

        <section id="loadingArea" class="hidden">
            <div class="loader-container">
                <div class="scan-line"></div>
                <div class="terminal-text">
                    ANALYZING BOARD...
                </div>
            </div>
        </section>

        <section id="resultsArea" class="hidden fade-in">
            <h2>> ANALYSIS REPORT</h2>

            <div id="verdictBox" class="verdict-box">
            </div>

            <div class="result-stack" id="imagesStack">
            </div>
        </section>

    </main>

    <footer>
        Created by Efremenko & Mesenyov // 2026
    </footer>

    <script src="/static/js/script.js"></script>
</body>

</html>
